version: 2.1

# ═══════════════════════════════════════════════════════════════
# FreightFox — CircleCI Terraform Pipeline
#
# WORKFLOWS:
# 1. Feature branch → validate + plan only (safe)
# 2. Merge to main  → validate + plan + approve + apply
# 3. destroy branch → approve + destroy (emergency only)
#
# REQUIRED CONTEXT: gcp-credentials
# → GOOGLE_CREDENTIALS = GCP Service Account JSON key
# ═══════════════════════════════════════════════════════════════

parameters:
  environment:
    type: enum
    enum: [tms-dev, tms-staging, tms-prod, vms-dev, vms-staging, vms-prod, analytics-dev, analytics-prod, shared]
    default: "tms-dev"

executors:
  tf-executor:
    docker:
      - image: hashicorp/terraform:1.9.0
    working_directory: ~/project
    environment:
      TF_CLI_ARGS: "-no-color"
      GOOGLE_APPLICATION_CREDENTIALS: /tmp/gcp-key.json

commands:
  setup-gcp:
    steps:
      - run:
          name: Setup GCP credentials
          command: |
            echo "$GOOGLE_CREDENTIALS" > /tmp/gcp-key.json
            echo "✅ GCP credentials configured"

  tf-init:
    parameters:
      environment:
        type: string
        default: "tms-dev"
    steps:
      - run:
          name: Terraform Init
          command: |
            cd environments/<< parameters.environment >>
            terraform init -input=false
            echo "✅ Initialized << parameters.environment >>"

jobs:
  validate:
    executor: tf-executor
    steps:
      - checkout
      - setup-gcp
      - tf-init:
          environment: << pipeline.parameters.environment >>
      - run:
          name: Terraform Format Check
          command: |
            terraform fmt -check -recursive
            echo "✅ Format check passed"
      - run:
          name: Terraform Validate
          command: |
            cd environments/<< pipeline.parameters.environment >>
            terraform validate
            echo "✅ Validate passed"

  plan:
    executor: tf-executor
    steps:
      - checkout
      - setup-gcp
      - tf-init:
          environment: << pipeline.parameters.environment >>
      - run:
          name: Terraform Plan
          command: |
            cd environments/<< pipeline.parameters.environment >>
            terraform plan \
              -var-file="terraform.tfvars" \
              -out=tfplan \
              -input=false
            echo "✅ Plan complete — review before approving"
      - run:
          name: Show Plan Summary
          command: |
            cd environments/<< pipeline.parameters.environment >>
            terraform show -no-color tfplan
      - persist_to_workspace:
          root: .
          paths:
            - environments/<< pipeline.parameters.environment >>/tfplan
            - environments/<< pipeline.parameters.environment >>/.terraform
            - environments/<< pipeline.parameters.environment >>/.terraform.lock.hcl

  apply:
    executor: tf-executor
    steps:
      - checkout
      - setup-gcp
      - attach_workspace:
          at: .
      - run:
          name: Terraform Apply
          command: |
            cd environments/<< pipeline.parameters.environment >>
            terraform apply -auto-approve -input=false tfplan
            echo "✅ Apply complete"
      - run:
          name: Show Outputs
          command: |
            cd environments/<< pipeline.parameters.environment >>
            terraform output

  destroy:
    executor: tf-executor
    steps:
      - checkout
      - setup-gcp
      - tf-init:
          environment: << pipeline.parameters.environment >>
      - run:
          name: Terraform Destroy
          command: |
            cd environments/<< pipeline.parameters.environment >>
            terraform destroy \
              -var-file="terraform.tfvars" \
              -auto-approve \
              -input=false
            echo "✅ Destroy complete"

workflows:
  # Feature branch — plan only
  plan-only:
    when:
      not:
        equal: [main, << pipeline.git.branch >>]
    jobs:
      - validate:
          context: gcp-credentials
      - plan:
          context: gcp-credentials
          requires:
            - validate

  # Main branch — plan + approve + apply
  deploy:
    when:
      equal: [main, << pipeline.git.branch >>]
    jobs:
      - validate:
          context: gcp-credentials
      - plan:
          context: gcp-credentials
          requires:
            - validate
      - hold-for-approval:
          type: approval
          requires:
            - plan
      - apply:
          context: gcp-credentials
          requires:
            - hold-for-approval

  # Destroy — emergency only
  destroy:
    when:
      equal: [destroy, << pipeline.git.branch >>]
    jobs:
      - hold-for-destroy:
          type: approval
      - destroy:
          context: gcp-credentials
          requires:
            - hold-for-destroy
